services:
  # ── Backend: Flask API ──────────────────────────────────────────────
  - type: web
    name: predly-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_PORT
        value: 10000          # Render always uses port 10000 internally
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: LLM_API_KEY
        sync: false           # You fill this in the Render dashboard
      - key: LLM_API_KEY_2
        sync: false
      - key: LLM_API_KEY_3
        sync: false
      - key: LLM_API_KEY_4
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL_NAME
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: LLM_BOOST_API_KEY_1
        sync: false
      - key: LLM_BOOST_API_KEY_2
        sync: false
      - key: LLM_BOOST_API_KEY_3
        sync: false
      - key: LLM_BOOST_BASE_URL
        sync: false
      - key: LLM_BOOST_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend: Vite/Vue static site ─────────────────────────────────
  - type: web
    name: predly-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: predly-backend
          type: web
          property: host         # Auto-wires the backend URL into the frontend build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # SPA fallback — Vue Router handles client-side routes