services:
  - type: web
    name: predly-api
    runtime: docker
    region: oregon
    branch: predly
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: false

buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && VITE_API_BASE_URL="/api" npm run build