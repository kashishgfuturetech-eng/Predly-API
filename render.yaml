services:
  - type: web
    name: predly-api
    runtime: python
    region: oregon
    branch: predly
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm ci && VITE_API_BASE_URL="" npm run build
    startCommand: cd backend && python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: false